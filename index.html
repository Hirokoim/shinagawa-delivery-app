<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品川インターシティ 搬出入申請管理システム</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', 'Yu Gothic', sans-serif; }
  .check-item { transition: all 0.15s ease; }
  input[type="radio"] { accent-color: #1e3a5f; }
  select:focus, input:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px #1e3a5f44; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ===== HEADER ===== -->
<header style="background:#1e3a5f" class="text-white shadow-lg sticky top-0 z-30">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3">
    <span class="text-3xl">🏢</span>
    <div>
      <h1 class="font-bold text-base leading-tight">品川インターシティ</h1>
      <p class="text-xs opacity-70 tracking-widest">搬出入申請管理システム</p>
    </div>
    <span id="todayDisp" class="ml-auto text-xs opacity-60 hidden sm:block text-right"></span>
  </div>
</header>

<!-- ===== TABS ===== -->
<div class="bg-white border-b shadow-sm sticky top-14 z-20">
  <div class="max-w-5xl mx-auto px-2 flex overflow-x-auto">
    <button id="tab-A" onclick="switchTab('A')" class="tab px-4 py-3 text-sm whitespace-nowrap border-b-2 transition-colors">📝 新規申請</button>
    <button id="tab-B" onclick="switchTab('B')" class="tab px-4 py-3 text-sm whitespace-nowrap border-b-2 transition-colors">📋 申請履歴</button>
    <button id="tab-C" onclick="switchTab('C')" class="tab px-4 py-3 text-sm whitespace-nowrap border-b-2 transition-colors">📊 管理ダッシュボード</button>
    <button id="tab-D" onclick="switchTab('D')" class="tab px-4 py-3 text-sm whitespace-nowrap border-b-2 transition-colors">📅 スケジュール</button>
  </div>
</div>

<main class="max-w-5xl mx-auto px-4 py-6 pb-20">

  <!-- ===== SCREEN A: 新規申請 ===== -->
  <div id="screen-A">
    <h2 class="text-lg font-bold mb-5" style="color:#1e3a5f">新規搬出入申請</h2>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-5">
      <form id="appForm">

        <!-- 1. 申請種別 -->
        <fieldset class="mb-5">
          <legend class="text-sm font-semibold text-gray-700 mb-2">1. 申請種別 <span class="text-red-500">*</span></legend>
          <div class="flex flex-wrap gap-5">
            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="appType" value="臨時" onchange="runCheck()"> 臨時</label>
            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="appType" value="定期" onchange="runCheck()"> 定期</label>
            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="appType" value="大量物・重量物" onchange="runCheck()"> 大量物・重量物</label>
          </div>
        </fieldset>

        <!-- 2. 作業種別 -->
        <fieldset class="mb-5">
          <legend class="text-sm font-semibold text-gray-700 mb-2">2. 作業種別 <span class="text-red-500">*</span></legend>
          <div class="flex flex-wrap gap-5">
            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="workType" value="搬入" onchange="runCheck()"> 搬入</label>
            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="workType" value="搬出" onchange="runCheck()"> 搬出</label>
            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="workType" value="搬入出両方" onchange="runCheck()"> 搬入出両方</label>
          </div>
        </fieldset>

        <!-- 3. 作業内容 -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">3. 作業内容 <span class="text-red-500">*</span></label>
          <select id="workContent" onchange="runCheck()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-full max-w-xs">
            <option value="">-- 選択してください --</option>
            <option>引越し</option>
            <option>新規什器</option>
            <option>工事資材</option>
            <option>資材搬出</option>
            <option>廃棄物搬出</option>
            <option>特殊物品（自販機・金庫・サーバー等）</option>
            <option>その他</option>
          </select>
        </div>

        <!-- 4. 希望日 -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">4. 希望日 <span class="text-red-500">*</span></label>
          <input type="date" id="desiredDate" onchange="runCheck()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm">
        </div>

        <!-- 5. 希望時間帯 -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">5. 希望時間帯 <span class="text-red-500">*</span></label>
          <div class="flex flex-wrap items-center gap-2">
            <select id="startTime" onchange="runCheck()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="">開始時刻</option></select>
            <span class="text-gray-400">〜</span>
            <select id="endTime" onchange="runCheck()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="">終了時刻</option></select>
          </div>
        </div>

        <!-- 6. 車両台数 -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">6. 車両台数 <span class="text-red-500">*</span></label>
          <div class="flex items-center gap-2">
            <input type="number" id="vehicleCount" min="1" max="20" oninput="runCheck()" placeholder="1〜20" class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-24">
            <span class="text-sm text-gray-500">台</span>
          </div>
        </div>

        <!-- 7. 車両サイズ -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">7. 車両サイズ <span class="text-red-500">*</span></label>
          <select id="vehicleSize" onchange="runCheck()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm">
            <option value="">-- 選択してください --</option>
            <option>軽トラ</option>
            <option>1BOX</option>
            <option>2tトラック</option>
          </select>
          <p class="text-red-500 text-xs mt-1 font-medium">※ 4t車以上は入場不可</p>
        </div>

        <!-- 8. 搬出入先フロア -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">8. 搬出入先フロア <span class="text-red-500">*</span></label>
          <select id="targetFloor" onchange="runCheck()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm">
            <option value="">-- 選択してください --</option>
          </select>
        </div>

        <!-- 9. 段ボール数 -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">9. 段ボール数</label>
          <div class="flex items-center gap-2">
            <input type="number" id="cardboardCount" min="0" oninput="runCheck()" placeholder="0" class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-24">
            <span class="text-sm text-gray-500">箱</span>
          </div>
        </div>

        <!-- 10. 総重量 -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">10. 総重量（概算）</label>
          <div class="flex items-center gap-2">
            <input type="number" id="totalWeight" min="0" oninput="runCheck()" placeholder="0" class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-28">
            <span class="text-sm text-gray-500">kg</span>
          </div>
        </div>

        <!-- 11. 特殊物品 -->
        <fieldset class="mb-5">
          <legend class="text-sm font-semibold text-gray-700 mb-2">11. 特殊物品の有無 <span class="text-red-500">*</span></legend>
          <div class="flex flex-wrap gap-5 mb-2">
            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="specialItem" value="なし" checked onchange="toggleSpecial();runCheck()"> なし</label>
            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="specialItem" value="あり" onchange="toggleSpecial();runCheck()"> あり</label>
          </div>
          <div id="specialDetail" class="hidden">
            <input type="text" id="specialText" oninput="runCheck()" placeholder="特殊物品の詳細（例：サーバーラック 3台、金庫 1台）" class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-full max-w-md">
          </div>
        </fieldset>

        <!-- 12. 開梱・設置作業 -->
        <fieldset class="mb-5">
          <legend class="text-sm font-semibold text-gray-700 mb-2">12. 開梱・設置作業の有無 <span class="text-red-500">*</span></legend>
          <div class="flex flex-wrap gap-5">
            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="unpackWork" value="なし" checked onchange="runCheck()"> なし</label>
            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="unpackWork" value="あり" onchange="runCheck()"> あり</label>
          </div>
        </fieldset>

        <!-- 13. 備考 -->
        <div class="mb-1">
          <label class="block text-sm font-semibold text-gray-700 mb-2">13. 備考</label>
          <textarea id="remarks" rows="3" placeholder="特記事項があればご記入ください" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea>
        </div>

      </form>
    </div><!-- /form card -->

    <!-- AI CHECK PANEL -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-5">
      <h3 class="text-sm font-bold mb-3 flex items-center gap-2" style="color:#1e3a5f">
        <span class="text-base">🤖</span> AIチェック結果
      </h3>
      <div id="aiResults">
        <p class="text-gray-400 text-sm">フォームを入力するとリアルタイムでチェック結果が表示されます。</p>
      </div>
    </div>

    <!-- SUMMARY PANEL -->
    <div id="summaryBox" class="hidden bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-5">
      <h3 class="text-sm font-bold mb-4" style="color:#1e3a5f">📋 申請サマリー</h3>
      <div id="summaryGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-y-4 gap-x-6 text-sm mb-4"></div>
      <div id="summaryStatus" class="pt-3 border-t border-gray-100"></div>
    </div>

    <div class="flex justify-end">
      <button onclick="submitApp()" class="px-8 py-2.5 text-white text-sm font-semibold rounded-lg shadow hover:opacity-90 transition-opacity" style="background:#1e3a5f">
        申請する →
      </button>
    </div>
  </div><!-- /screen-A -->

  <!-- ===== SCREEN B: 申請履歴 ===== -->
  <div id="screen-B" class="hidden">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
      <h2 class="text-lg font-bold" style="color:#1e3a5f">申請履歴</h2>
      <button onclick="switchTab('A')" class="px-4 py-2 text-white text-xs font-semibold rounded-lg" style="background:#1e3a5f">＋ 新規申請</button>
    </div>
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 mb-4">
      <div class="flex flex-wrap items-center gap-2">
        <span class="text-xs text-gray-500 font-medium">絞り込み：</span>
        <button id="fb-all"    onclick="setFilter('all')"    class="filter-btn px-3 py-1 rounded-full border text-xs font-medium transition-all">すべて</button>
        <button id="fb-審査中" onclick="setFilter('審査中')" class="filter-btn px-3 py-1 rounded-full border text-xs font-medium transition-all">🔍 審査中</button>
        <button id="fb-承認済み" onclick="setFilter('承認済み')" class="filter-btn px-3 py-1 rounded-full border text-xs font-medium transition-all">✅ 承認済み</button>
        <button id="fb-修正依頼" onclick="setFilter('修正依頼')" class="filter-btn px-3 py-1 rounded-full border text-xs font-medium transition-all">✏️ 修正依頼</button>
        <button id="fb-却下"   onclick="setFilter('却下')"   class="filter-btn px-3 py-1 rounded-full border text-xs font-medium transition-all">❌ 却下</button>
      </div>
    </div>
    <div id="historyList"></div>
  </div>

  <!-- ===== SCREEN C ===== -->
  <div id="screen-C" class="hidden">
    <h2 class="text-lg font-bold mb-5" style="color:#1e3a5f">管理ダッシュボード</h2>
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-16 text-center">
      <div class="text-7xl mb-4">📊</div>
      <p class="text-gray-500 font-medium">管理ダッシュボードは準備中です</p>
      <p class="text-gray-400 text-sm mt-2">次のプロンプトで実装予定</p>
    </div>
  </div>

  <!-- ===== SCREEN D ===== -->
  <div id="screen-D" class="hidden">
    <h2 class="text-lg font-bold mb-5" style="color:#1e3a5f">スケジュール</h2>
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-16 text-center">
      <div class="text-7xl mb-4">📅</div>
      <p class="text-gray-500 font-medium">スケジュール画面は準備中です</p>
      <p class="text-gray-400 text-sm mt-2">次のプロンプトで実装予定</p>
    </div>
  </div>

</main>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const MC = '#1e3a5f';
const COMM_FLOORS = ['1F','2F','22F'];
const MOCK_SLOTS = [
  { date:'2026-06-14', s:22*60, e:26*60, label:'6/14（土）22:00〜翌02:00' },
  { date:'2026-06-20', s:22*60, e:26*60, label:'6/20（土）22:00〜翌02:00' },
  { date:'2026-06-21', s: 9*60, e:13*60, label:'6/21（日）09:00〜13:00' },
];

// ============================================================
// UTILS
// ============================================================
const pad = n => String(n).padStart(2,'0');

function minsToLabel(m) {
  if (m >= 1440) { const h=Math.floor((m-1440)/60),mn=(m-1440)%60; return `翌${pad(h)}:${pad(mn)}`; }
  return `${pad(Math.floor(m/60))}:${pad(m%60)}`;
}

function isWeekday(ds) {
  if (!ds) return null;
  const d = new Date(ds + 'T00:00:00');
  return d.getDay() >= 1 && d.getDay() <= 5;
}

function bizDaysBetween(from, to) {
  const f = new Date(from+'T00:00:00'), t = new Date(to+'T00:00:00');
  let cnt = 0, cur = new Date(f);
  while (cur < t) { cur.setDate(cur.getDate()+1); if(cur.getDay()>=1&&cur.getDay()<=5) cnt++; }
  return cnt;
}

function subtractBizDays(ds, days) {
  const d = new Date(ds+'T00:00:00'); let sub = 0;
  while (sub < days) { d.setDate(d.getDate()-1); if(d.getDay()>=1&&d.getDay()<=5) sub++; }
  return d;
}

function fmtDate(d) { return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`; }

function todayStr() {
  const t = new Date();
  return `${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}`;
}

// ============================================================
// INIT SELECTS
// ============================================================
function initSelects() {
  // Time
  const sS = document.getElementById('startTime'), sE = document.getElementById('endTime');
  const mins = [];
  for (let h=0;h<24;h++) for (let m=0;m<60;m+=30) mins.push(h*60+m);
  for (let h=0;h<=6;h++) for (let m=0;m<60;m+=30) { if(h===6&&m>0) break; mins.push((h+24)*60+m); }
  mins.forEach(v => {
    sS.add(new Option(minsToLabel(v), v));
    sE.add(new Option(minsToLabel(v), v));
  });
  // Floors
  const sf = document.getElementById('targetFloor');
  ['B2F','B1F'].forEach(f => sf.add(new Option(f,f)));
  for (let i=1;i<=38;i++) sf.add(new Option(i+'F', i+'F'));
}

// ============================================================
// TABS
// ============================================================
let activeTab = '';
function switchTab(t) {
  ['A','B','C','D'].forEach(x => {
    document.getElementById('screen-'+x).classList.add('hidden');
    const b = document.getElementById('tab-'+x);
    b.style.color = '#6b7280'; b.style.borderBottomColor = 'transparent'; b.style.fontWeight = '';
  });
  document.getElementById('screen-'+t).classList.remove('hidden');
  const ab = document.getElementById('tab-'+t);
  ab.style.color = MC; ab.style.borderBottomColor = MC; ab.style.fontWeight = '600';
  activeTab = t;
  if (t === 'B') { renderHistory(); setFilter(currentFilter||'all'); }
}

// ============================================================
// SPECIAL ITEM TOGGLE
// ============================================================
function toggleSpecial() {
  const v = document.querySelector('input[name="specialItem"]:checked')?.value;
  document.getElementById('specialDetail').classList.toggle('hidden', v !== 'あり');
}

// ============================================================
// FORM VALUES
// ============================================================
function getVals() {
  return {
    appType:        document.querySelector('input[name="appType"]:checked')?.value || '',
    workType:       document.querySelector('input[name="workType"]:checked')?.value || '',
    workContent:    document.getElementById('workContent').value,
    desiredDate:    document.getElementById('desiredDate').value,
    startMin:       document.getElementById('startTime').value !== '' ? parseInt(document.getElementById('startTime').value) : null,
    endMin:         document.getElementById('endTime').value !== ''   ? parseInt(document.getElementById('endTime').value)   : null,
    vehicleCount:   parseInt(document.getElementById('vehicleCount').value) || 0,
    vehicleSize:    document.getElementById('vehicleSize').value,
    targetFloor:    document.getElementById('targetFloor').value,
    cardboardCount: parseInt(document.getElementById('cardboardCount').value) || 0,
    totalWeight:    parseInt(document.getElementById('totalWeight').value)    || 0,
    specialItem:    document.querySelector('input[name="specialItem"]:checked')?.value || 'なし',
    unpackWork:     document.querySelector('input[name="unpackWork"]:checked')?.value  || 'なし',
    remarks:        document.getElementById('remarks').value,
  };
}

// ============================================================
// AI CHECK ENGINE
// ============================================================
function runCheck() {
  const v = getVals();
  const res = [];

  // ── Rule 1: 大量物判定 ──
  const bReasons = [];
  if (v.vehicleSize === '2tトラック' && v.vehicleCount >= 2) bReasons.push(`2tトラック ${v.vehicleCount}台`);
  if (v.cardboardCount > 100) bReasons.push(`段ボール ${v.cardboardCount}箱`);
  if (v.totalWeight > 500)    bReasons.push(`総重量 ${v.totalWeight}kg`);
  const isBulk = bReasons.length > 0;

  const anyBulkInput = v.vehicleSize || v.vehicleCount || v.cardboardCount || v.totalWeight;
  if (anyBulkInput) {
    if (isBulk) {
      res.push({ icon:'⚠️', cls:'warn', lbl:'ルール1：大量物判定',
        msg:`大量物に該当します（${bReasons.join('、')}）。<br>搬出入作業は原則として<strong>平日夜間（22:00〜翌6:00）もしくは土日祝</strong>に実施が必要です。` });
    } else {
      res.push({ icon:'✅', cls:'ok', lbl:'ルール1：大量物判定',
        msg:'大量物には該当しません。通常申請で処理可能です。' });
    }
  }

  // ── Rule 2: 時間帯チェック ──
  if (v.desiredDate && v.startMin !== null && v.endMin !== null) {
    const DAY_S=6*60, DAY_E=22*60;
    const overlapDay = v.startMin < DAY_E && v.endMin > DAY_S;
    const weekday = isWeekday(v.desiredDate);
    if (isBulk && weekday && overlapDay) {
      let altHtml = '<div class="mt-3 space-y-2"><p class="text-xs font-semibold">💡 代替枠の提案：</p>';
      MOCK_SLOTS.forEach(sl => {
        altHtml += `<div class="flex items-center justify-between bg-white rounded border border-red-200 px-3 py-2">
          <span class="text-xs">${sl.label}</span>
          <button onclick="applySlot(${sl.s},${sl.e},'${sl.date}')" class="text-xs text-white px-2 py-1 rounded ml-2 hover:opacity-80" style="background:${MC}">この時間で申請 →</button>
        </div>`;
      });
      altHtml += '</div>';
      res.push({ icon:'❌', cls:'error', lbl:'ルール2：時間帯チェック',
        msg:'大量物は<strong>平日日中（6:00〜22:00）の搬出入はできません</strong>。平日夜間（22:00〜翌6:00）または土日祝を選択してください。' + altHtml });
    } else {
      res.push({ icon:'✅', cls:'ok', lbl:'ルール2：時間帯チェック',
        msg:'通常申請の時間帯条件を満たしています。' });
    }
  }

  // ── Rule 3: 車両サイズ ──
  res.push({ icon:'✅', cls:'ok', lbl:'ルール3：車両サイズ制限',
    msg:'車両サイズ制限OK（車幅2.1m以下 × 車長6.5m以下 × 車高3.1m以下）' });

  // ── Rule 4: 申請期限 ──
  if (v.desiredDate) {
    const isBulkType = isBulk || v.appType === '大量物・重量物';
    const req = isBulkType ? 10 : (v.appType === '臨時' ? 3 : 0);
    if (req > 0) {
      const left = bizDaysBetween(todayStr(), v.desiredDate);
      if (left >= req) {
        res.push({ icon:'✅', cls:'ok', lbl:'ルール4：申請期限',
          msg:`申請期限内です（残り${left}営業日 ／ 必要：${req}営業日前まで）` });
      } else {
        res.push({ icon:'❌', cls:'error', lbl:'ルール4：申請期限',
          msg:`申請期限を過ぎています（残り${left}営業日 ／ 必要：${req}営業日前まで）。<br>ご希望に沿えない場合があります。` });
      }
    }
  }

  // ── Rule 5: 搬出入ルート ──
  if (v.targetFloor) {
    const comm = COMM_FLOORS.includes(v.targetFloor);
    res.push({ icon:'ℹ️', cls:'info', lbl:'ルール5：搬出入ルート自動提案',
      msg: comm
        ? '推奨ルート：<strong>ルートD（G6・G7 → 荷捌き14,15番）</strong> ※商業エリア'
        : '推奨ルート：<strong>ルートA（EV-1 → 荷捌き1,2番）</strong> 最大積載2,600kg' });
  }

  // ── Rule 6: 特殊物品 ──
  if (v.specialItem === 'あり') {
    res.push({ icon:'⚠️', cls:'warn', lbl:'ルール6：特殊物品チェック',
      msg:'特殊物品は縦持ち対象外です。<strong>直納＋EVオペレーター手配が必要</strong>です（日中 26,000円 ／ 夜間 34,000円 per ELV）' });
  }

  // ── Rule 7: 作業申請書 ──
  if (v.unpackWork === 'あり') {
    res.push({ icon:'⚠️', cls:'warn', lbl:'ルール7：作業申請書チェック',
      msg:'搬出入申請に加えて<strong>「作業申請書」の提出が必要</strong>です（ポータルサイトにて提出）' });
  }

  // ── Rule 8: 費用概算 ──
  if (isBulk && v.vehicleCount > 0) {
    const night = v.startMin !== null && (v.startMin >= 22*60 || (v.endMin !== null && v.endMin > 24*60));
    let costMsg;
    if (v.vehicleCount >= 10) {
      const rate = night ? 34000 : 24000;
      costMsg = `縦持ち料金（${v.vehicleCount}台）：${night?'夜間':'日中'} ${rate.toLocaleString()}円 × ${v.vehicleCount}台 = <strong>${(rate*v.vehicleCount).toLocaleString()}円</strong>`;
    } else {
      costMsg = `縦持ち料金（${v.vehicleCount}台）：<strong>都度見積</strong>`;
    }
    costMsg += '　｜　荷捌駐車料金：30分無料、以降400円/30分';
    res.push({ icon:'💴', cls:'info', lbl:'ルール8：費用概算', msg: costMsg });
  }

  // ── Rule 9: キャンセル期限 ──
  if (isBulk && v.desiredDate) {
    const cd = subtractBizDays(v.desiredDate, 6);
    res.push({ icon:'📅', cls:'info', lbl:'ルール9：キャンセル期限',
      msg:`キャンセル期限：<strong>${fmtDate(cd)} 18:00まで</strong>（希望日の6営業日前）` });
  }

  renderAI(res);
  renderSummary(v, isBulk, res);
}

// ── Render AI results ──
function renderAI(res) {
  if (!res.length) {
    document.getElementById('aiResults').innerHTML = '<p class="text-gray-400 text-sm">フォームを入力するとリアルタイムでチェック結果が表示されます。</p>';
    return;
  }
  const S = {
    ok:    'bg-green-50 border-green-200 text-green-800',
    error: 'bg-red-50 border-red-200 text-red-800',
    warn:  'bg-yellow-50 border-yellow-200 text-yellow-800',
    info:  'bg-blue-50 border-blue-200 text-blue-800',
  };
  document.getElementById('aiResults').innerHTML = res.map(r =>
    `<div class="check-item rounded-lg border ${S[r.cls]||S.info} px-3 py-2.5 mb-2">
      <div class="flex gap-2">
        <span class="text-base shrink-0 mt-0.5">${r.icon}</span>
        <div>
          <p class="text-xs font-semibold mb-0.5 opacity-60">${r.lbl}</p>
          <p class="text-sm leading-relaxed">${r.msg}</p>
        </div>
      </div>
    </div>`
  ).join('');
}

function applySlot(s, e, date) {
  document.getElementById('desiredDate').value = date;
  document.getElementById('startTime').value = s;
  document.getElementById('endTime').value = e;
  runCheck();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Summary ──
function renderSummary(v, isBulk, res) {
  const box = document.getElementById('summaryBox');
  if (!v.appType || !v.workType || !v.workContent || !v.desiredDate) { box.classList.add('hidden'); return; }
  box.classList.remove('hidden');

  const isBulkType = isBulk || v.appType === '大量物・重量物';
  const cls = isBulk ? '大量物' : (v.appType === '大量物・重量物' ? '重量物' : '通常');
  const req = isBulkType ? 10 : (v.appType === '臨時' ? 3 : 0);
  const deadline = req > 0 && v.desiredDate ? fmtDate(subtractBizDays(v.desiredDate, req)) + `（${req}営業日前まで）` : '規定なし';
  const recTime = isBulkType ? '平日夜間 22:00〜翌6:00 または土日祝' : '制限なし（通常申請）';
  const isComm = COMM_FLOORS.includes(v.targetFloor);
  const route = v.targetFloor ? (isComm ? 'ルートD（G6・G7 → 荷捌き14,15番）' : 'ルートA（EV-1 → 荷捌き1,2番）') : '—';
  const yogo = isBulkType ? '要（養生シート必須）' : '不要';
  const tatemo = isBulk && v.vehicleCount >= 2 ? '要' : '不要';
  const cancel = isBulkType && v.desiredDate ? fmtDate(subtractBizDays(v.desiredDate, 6)) + ' 18:00' : '—';
  let cost = '—';
  if (isBulk && v.vehicleCount) {
    const night = v.startMin !== null && (v.startMin >= 22*60 || (v.endMin !== null && v.endMin > 24*60));
    cost = v.vehicleCount >= 10 ? `${(night?34000:24000).toLocaleString()}円 × ${v.vehicleCount}台` : '都度見積';
  }

  const items = [
    ['分類', cls], ['申請期限', deadline], ['推奨時間帯', recTime],
    ['推奨ルート', route], ['養生の要否', yogo], ['縦持ちの要否', tatemo],
    ['キャンセル期限', cancel], ['概算費用', cost],
  ];
  document.getElementById('summaryGrid').innerHTML = items.map(([k,val]) =>
    `<div><p class="text-xs text-gray-400 font-medium">${k}</p><p class="text-sm font-semibold text-gray-800 mt-0.5">${val}</p></div>`
  ).join('');

  const hasErr = res.some(r => r.cls === 'error');
  document.getElementById('summaryStatus').innerHTML = hasErr
    ? `<p class="text-red-700 font-semibold text-sm">❌ 条件を確認してください（AIチェック結果を修正後に申請してください）</p>`
    : `<p class="text-green-700 font-semibold text-sm">✅ 申請可能です</p>`;
}

// ============================================================
// SUBMIT
// ============================================================
function submitApp() {
  const v = getVals();
  if (!v.appType || !v.workType || !v.workContent || !v.desiredDate || v.startMin === null || v.endMin === null || !v.vehicleSize || !v.targetFloor || !v.vehicleCount) {
    alert('必須項目をすべて入力してください。\n（申請種別・作業種別・作業内容・希望日・希望時間帯・車両台数・車両サイズ・搬出入先フロア）');
    return;
  }
  const apps = getApps();
  // Find max seq
  let maxSeq = 0;
  apps.forEach(a => { const n = parseInt(a.id.replace('BAP','')); if(n>maxSeq) maxSeq=n; });
  const id = 'BAP' + String(maxSeq+1).padStart(5,'0');
  apps.push({ ...v, id, company:'テナント株式会社', status:'審査中', createdAt: new Date().toISOString() });
  saveApps(apps);
  alert(`申請を受け付けました。\n申請番号：${id}`);
  // Reset form
  document.getElementById('appForm').reset();
  document.querySelector('input[name="specialItem"][value="なし"]').checked = true;
  document.querySelector('input[name="unpackWork"][value="なし"]').checked = true;
  document.getElementById('specialDetail').classList.add('hidden');
  document.getElementById('summaryBox').classList.add('hidden');
  document.getElementById('aiResults').innerHTML = '<p class="text-gray-400 text-sm">フォームを入力するとリアルタイムでチェック結果が表示されます。</p>';
  switchTab('B');
}

// ============================================================
// HISTORY
// ============================================================
let currentFilter = 'all';
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.style.backgroundColor=''; b.style.color=''; b.style.borderColor='';
  });
  const ab = document.getElementById('fb-'+f);
  if (ab) { ab.style.backgroundColor=MC; ab.style.color='#fff'; ab.style.borderColor=MC; }
  renderHistory();
}

const SS = {
  '審査中':  { bg:'bg-blue-100 text-blue-800',   icon:'🔍' },
  '承認済み':{ bg:'bg-green-100 text-green-800', icon:'✅' },
  '修正依頼':{ bg:'bg-yellow-100 text-yellow-800', icon:'✏️' },
  '却下':    { bg:'bg-red-100 text-red-800',     icon:'❌' },
};

function renderHistory() {
  const apps = getApps();
  const list = currentFilter === 'all' ? apps : apps.filter(a => a.status === currentFilter);
  const el = document.getElementById('historyList');
  if (!list.length) {
    el.innerHTML = '<div class="bg-white rounded-xl border border-gray-100 p-10 text-center text-gray-400 text-sm">該当する申請はありません</div>';
    return;
  }
  el.innerHTML = [...list].reverse().map(a => {
    const ss = SS[a.status] || { bg:'bg-gray-100 text-gray-700', icon:'?' };
    const isComm = COMM_FLOORS.includes(a.targetFloor);
    const route = isComm ? 'ルートD（G6・G7 → 荷捌き14,15番）' : 'ルートA（EV-1 → 荷捌き1,2番）';
    const sLbl = a.startMin != null ? minsToLabel(a.startMin) : '—';
    const eLbl = a.endMin   != null ? minsToLabel(a.endMin)   : '—';
    const dDisp = a.desiredDate ? a.desiredDate.replace(/-/g,'/') : '—';
    return `<div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 mb-3 hover:shadow-md transition-shadow">
      <div class="flex flex-wrap items-start justify-between gap-2 mb-3">
        <div>
          <span class="text-xs font-mono text-gray-400">${a.id}</span>
          <p class="font-bold text-gray-900">${a.company || 'テナント'}</p>
        </div>
        <span class="px-3 py-1 rounded-full text-xs font-semibold ${ss.bg}">${ss.icon} ${a.status}</span>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-3 gap-3 text-sm">
        <div><p class="text-xs text-gray-400">申請種別</p><p class="font-medium text-gray-800">${a.appType||'—'}</p></div>
        <div><p class="text-xs text-gray-400">作業内容</p><p class="font-medium text-gray-800">${a.workType||''} / ${a.workContent||'—'}</p></div>
        <div><p class="text-xs text-gray-400">希望日時</p><p class="font-medium text-gray-800">${dDisp} ${sLbl}〜${eLbl}</p></div>
        <div><p class="text-xs text-gray-400">車両</p><p class="font-medium text-gray-800">${a.vehicleSize||'—'} × ${a.vehicleCount||'—'}台</p></div>
        <div><p class="text-xs text-gray-400">搬出入先</p><p class="font-medium text-gray-800">${a.targetFloor||'—'}</p></div>
        <div><p class="text-xs text-gray-400">推奨ルート</p><p class="font-medium text-gray-800">${route}</p></div>
      </div>
      ${a.modNote ? `<div class="mt-3 bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-xs text-yellow-800"><strong>修正依頼：</strong>${a.modNote}</div>` : ''}
    </div>`;
  }).join('');
}
